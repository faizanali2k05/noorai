name: noorai
description: Pakistan's First Agentic Special Needs Therapy Marketplace.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  http_parser: ^4.0.2

# Fix: record 5.x resolved an old record_linux (0.7.2) that doesn't implement
# the newer record_platform_interface (startStream/hasPermission), breaking the
# build. Force the updated Linux federated implementation.
dependency_overrides:
  record_linux: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Launcher icons are generated from the brand asset pack below. To regenerate:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# App icon config — sourced from the NoorAI brand pack (assets/web + assets/android).
flutter_launcher_icons:
  android: true
  ios: false # no iOS Runner project in this repo (Android-first build)
  image_path: "assets/web/icon-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#01411C" # official Pakistan-flag deep green
  adaptive_icon_foreground: "assets/android/adaptive/ic_launcher_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Only the runtime logo marks are bundled — the rest of assets/ is the brand
  # source pack (favicons, launcher PNGs, vector sources) used at build time.
  assets:
    - assets/master/noorai-mark-white.svg
    - assets/master/noorai-mark-color.svg

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
