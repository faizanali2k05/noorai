name: noorai
description: Pakistan's First Agentic Special Needs Therapy Marketplace.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # After placing a 1024x1024 PNG at assets/app_icon.png, run:
  #   flutter pub run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# App icon config (requires assets/app_icon.png — see SUBMISSION_GUIDE.md)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: "assets/app_icon_fg.png"

flutter:
  uses-material-design: true

  assets:
    - assets/noorai_logo.svg
    # Uncomment after adding the PNG icon:
    # - assets/app_icon.png
